<section class="auth-page">
  <article class="auth-panel">
    <header class="auth-header">
      <h1>Login</h1>
      <p>Access your account.</p>
    </header>

    <form class="auth-form" (submit)="login(usernameInput.value, passwordInput.value); $event.preventDefault()">
      <div class="auth-field">
        <label for="login-username">Username</label>
        <input id="login-username" #usernameInput type="text" autocomplete="username">
      </div>

      <div class="auth-field">
        <label for="login-password">Password</label>
        <input id="login-password" #passwordInput type="password" autocomplete="current-password">
      </div>

      <button class="auth-button" type="submit">Login</button>
    </form>

    @if (message()) {
      <p class="auth-status success" role="status">{{ message() }}</p>
    }

    @if (error()) {
      <p class="auth-status error" role="alert">{{ error() }}</p>
    }

    <p class="auth-switch">
      Need an account?
      <a routerLink="/register">Register</a>
    </p>
  </article>
</section>
